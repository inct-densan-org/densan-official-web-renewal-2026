name: Deploy Next.js site to Pages

on:
  # mainブランチにプッシュされた時に実行します (必要に応じて master 等に変更してください)
  push:
    branches: ["main"]
  # GitHubのActionsタブから手動で実行できるようにします
  workflow_dispatch:

# GITHUB_TOKENの権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行の制御 (複数回プッシュされた場合に古いビルドをキャンセルします)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ビルドジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpmのセットアップ
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # お使いのpnpmのバージョンに合わせてください

      # Node.jsのセットアップとpnpmのキャッシュ有効化
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Next.jsとGitHub Pagesの連携セットアップ
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      # Next.jsのビルドキャッシュを復元 (2回目以降のビルドが高速化されます)
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      # 依存関係のインストール
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 静的エクスポートの実行
      - name: Build with Next.js
        run: pnpm run build

      # 生成された export ディレクトリをアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./export

  # デプロイジョブ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4